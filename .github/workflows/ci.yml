name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: npm run check
        run: npm run check
      - name: npm run test
        run: npm run test
      - name: npm run smoke
        run: npm run smoke
      - name: npm run package:smoke
        run: npm run package:smoke
      - name: npm run release:check
        run: npm run release:check
